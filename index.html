  <body>
    <div id="root"></div>
    <script>
      // SW killer + cache buster — runs on EVERY page load
      // Always unregister any service worker and clear caches, then reload once
      (function() {
        var VER = 'v5-nopwa';
        var done = localStorage.getItem('dg_cache_ver') === VER;
        if (!done) {
          var tasks = [];
          if ('serviceWorker' in navigator) {
            tasks.push(
              navigator.serviceWorker.getRegistrations().then(function(regs) {
                return Promise.all(regs.map(function(r) { return r.unregister(); }));
              })
            );
          }
          if ('caches' in window) {
            tasks.push(
              caches.keys().then(function(names) {
                return Promise.all(names.map(function(n) { return caches.delete(n); }));
              })
            );
          }
          Promise.all(tasks).then(function() {
            localStorage.setItem('dg_cache_ver', VER);
            location.reload();
          });
          // Stop page from rendering until reload
          document.getElementById('root').style.display = 'none';
        }
      })();
    </script>
